<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code — rendered</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
  :root { color-scheme: light dark; }
  body {
    max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 6rem;
    font: 16px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  hr { border: none; border-top: 1px solid rgba(128,128,128,.25); margin: 2.2rem 0; }
  h2 {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
    opacity: .5; margin: 1.5rem 0 .4rem; font-weight: 600;
  }
  p { margin: .6rem 0; }
  pre {
    background: rgba(128,128,128,.12); padding: .8rem 1rem;
    border-radius: 8px; overflow-x: auto;
  }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em; }
  pre code { background: none; padding: 0; }
  .katex-display { overflow-x: auto; overflow-y: hidden; padding: .3rem 0; }
  #status {
    position: fixed; top: .6rem; right: .8rem; font-size: .7rem;
    opacity: .35; font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
<div id="status">waiting for first turn…</div>
<main id="content"></main>

<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.js"></script>
<script>
  // texmath tokenizes $...$ / $$...$$ BEFORE markdown runs, so underscores and
  // backslashes inside math aren't mangled by the markdown parser.
  const md = window.markdownit({ html: false, linkify: true, breaks: false })
    .use(window.texmath, {
      engine: window.katex,
      delimiters: "dollars",                 // $inline$  and  $$display$$
      katexOptions: { throwOnError: false }
    });

  const content = document.getElementById("content");
  const status = document.getElementById("status");
  let last = null;

  async function tick() {
    try {
      const res = await fetch("latest.md", { cache: "no-store" });
      if (res.ok) {
        const text = await res.text();
        if (text !== last) {
          const nearBottom =
            (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 140);
          last = text;
          content.innerHTML = md.render(text);
          status.textContent = "updated " + new Date().toLocaleTimeString();
          if (nearBottom) window.scrollTo(0, document.body.scrollHeight);
        }
      }
    } catch (e) {
      // viewer is up but the server/file isn't ready yet — just keep polling
    }
    setTimeout(tick, 1000);
  }
  tick();
</script>
</body>
</html>
